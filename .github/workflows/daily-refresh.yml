name: Daily M&A Radar Refresh

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

concurrency:
  group: tl-ma-radar-daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      CAPITAL_RAISE_KRW: "30000000000"
      TARGET_MARKET: KOSDAQ
      MARKET_CAP_LIMIT_KRW: "30000000000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$DART_API_KEY" ]; then
            echo "::error::DART_API_KEY secret is required for DART collection."
            missing=1
          fi
          if [ -z "$NAVER_CLIENT_ID" ] || [ -z "$NAVER_CLIENT_SECRET" ]; then
            echo "::warning::Naver Search API secrets are missing. News collection may fall back or be incomplete."
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run full refresh pipeline
        run: >
          python scripts/run_pipeline.py
          --mode full
          --begin 20250101
          --download-reports latest
          --include-pdfs
          --save-text
          --max-reports 4
          --memo-limit 40
          --news top
          --news-limit 120
          --alert-limit 30

      - name: Send alerts when configured
        shell: bash
        run: |
          if python scripts/check_alert_channels.py --allow-missing | tee alert_channel_status.json | grep -q '"ready_for_real_send": true'; then
            python scripts/send_alert_notifications.py --limit 30
          else
            echo "Alert delivery is not configured; keeping refresh green."
          fi

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add tl_ma_radar/data README.md DEPLOYMENT.md OTHER_PC_SETUP.md || true
          if git diff --cached --quiet; then
            echo "No refreshed artifacts to commit."
          else
            git commit -m "Daily M&A radar refresh"
            git push origin HEAD:main
          fi

      - name: Upload pipeline logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-artifacts
          path: |
            tl_ma_radar/data/pipeline_runs/latest.json
            tl_ma_radar/data/notifications/latest.json
          if-no-files-found: ignore
